syntax = "proto3";
package monitoring.v1;

import "gogoproto/gogo.proto";
import "cosmos/base/query/v1beta1/pagination.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/usc-platform/usc-social-xxx-app/SERVICES/service-04-usc-blockchain-core/block-chain-cosmos/x/monitoring/types";

// MonitoringConfig represents structured monitoring configuration
message MonitoringConfig {
  int32 collection_interval_seconds = 1;
  int32 retention_days = 2;
  bool enable_alerts = 3;
  bool enable_notifications = 4;
  repeated string monitored_metrics = 5;
  map<string, string> custom_settings = 6;
}

// AlertRule represents an alert rule configuration
message AlertRule {
  string rule_id = 1;
  string rule_name = 2;
  MetricType metric_type = 3;
  string condition = 4; // >, <, >=, <=, ==, !=
  double threshold_value = 5;
  int32 evaluation_period_seconds = 6;
  int32 alert_cooldown_seconds = 7;
  bool enabled = 8;
  string notification_channels = 9; // email, sms, webhook, etc.
}

// MetricThreshold represents threshold configuration for metrics
message MetricThreshold {
  MetricType metric_type = 1;
  double warning_threshold = 2;
  double critical_threshold = 3;
  double min_threshold = 4;
  double max_threshold = 5;
  MetricUnit unit = 6;
  bool enabled = 7;
}

// TargetType defines the type of monitoring target
enum TargetType {
  TARGET_TYPE_UNSPECIFIED = 0;
  TARGET_TYPE_VALIDATOR = 1;
  TARGET_TYPE_NODE = 2;
  TARGET_TYPE_CONTRACT = 3;
  TARGET_TYPE_NETWORK = 4;
  TARGET_TYPE_SERVICE = 5;
}

// MonitoringStatus defines the status of a monitoring session
enum MonitoringStatus {
  MONITORING_STATUS_UNSPECIFIED = 0;
  MONITORING_STATUS_ACTIVE = 1;
  MONITORING_STATUS_STOPPED = 2;
  MONITORING_STATUS_PAUSED = 3;
  MONITORING_STATUS_ERROR = 4;
}

// MetricType defines the type of performance metric
enum MetricType {
  METRIC_TYPE_UNSPECIFIED = 0;
  METRIC_TYPE_CPU_USAGE = 1;
  METRIC_TYPE_MEMORY_USAGE = 2;
  METRIC_TYPE_DISK_USAGE = 3;
  METRIC_TYPE_NETWORK_LATENCY = 4;
  METRIC_TYPE_THROUGHPUT = 5;
  METRIC_TYPE_ERROR_RATE = 6;
  METRIC_TYPE_RESPONSE_TIME = 7;
  METRIC_TYPE_AVAILABILITY = 8;
  METRIC_TYPE_CUSTOM = 9;
}

// MetricStatus defines the status of a metric reading
enum MetricStatus {
  METRIC_STATUS_UNSPECIFIED = 0;
  METRIC_STATUS_NORMAL = 1;
  METRIC_STATUS_WARNING = 2;
  METRIC_STATUS_CRITICAL = 3;
  METRIC_STATUS_ERROR = 4;
}

// MetricUnit defines the unit of measurement for metrics
enum MetricUnit {
  METRIC_UNIT_UNSPECIFIED = 0;
  METRIC_UNIT_PERCENTAGE = 1;
  METRIC_UNIT_BYTES = 2;
  METRIC_UNIT_MILLISECONDS = 3;
  METRIC_UNIT_SECONDS = 4;
  METRIC_UNIT_COUNT = 5;
  METRIC_UNIT_RATE = 6;
  METRIC_UNIT_CUSTOM = 7;
}

// MsgStartMonitoring defines a message for starting performance monitoring
message MsgStartMonitoring {
  option (gogoproto.equal) = false;
  option (gogoproto.goproto_getters) = false;

  string monitor = 1;
  string target_id = 2; // validator, node, contract, etc.
  TargetType target_type = 3;
  MonitoringConfig monitoring_config = 4 [(gogoproto.nullable) = false];
  repeated AlertRule alert_rules = 5 [(gogoproto.nullable) = false];
  repeated MetricThreshold metric_thresholds = 6 [(gogoproto.nullable) = false];
  string memo = 7;
}

// MsgStartMonitoringResponse defines the response for MsgStartMonitoring
message MsgStartMonitoringResponse {
  bool success = 1;
  string monitoring_id = 2;
  string start_hash = 3;
  string transaction_hash = 4;
}

// MsgStopMonitoring defines a message for stopping performance monitoring
message MsgStopMonitoring {
  option (gogoproto.equal) = false;
  option (gogoproto.goproto_getters) = false;

  string stopper = 1;
  string monitoring_id = 2;
  string stop_reason = 3;
  string memo = 4;
}

// MsgStopMonitoringResponse defines the response for MsgStopMonitoring
message MsgStopMonitoringResponse {
  bool success = 1;
  string stop_hash = 2;
  string transaction_hash = 3;
}

// MsgUpdateMonitoring defines a message for updating monitoring configuration
message MsgUpdateMonitoring {
  option (gogoproto.equal) = false;
  option (gogoproto.goproto_getters) = false;

  string updater = 1;
  string monitoring_id = 2;
  MonitoringConfig new_config = 3 [(gogoproto.nullable) = false];
  repeated AlertRule new_alert_rules = 4 [(gogoproto.nullable) = false];
  repeated MetricThreshold new_metric_thresholds = 5 [(gogoproto.nullable) = false];
  string memo = 6;
}

// MsgUpdateMonitoringResponse defines the response for MsgUpdateMonitoring
message MsgUpdateMonitoringResponse {
  bool success = 1;
  string update_hash = 2;
  string transaction_hash = 3;
}

// MsgRecordMetrics defines a message for recording performance metrics
message MsgRecordMetrics {
  option (gogoproto.equal) = false;
  option (gogoproto.goproto_getters) = false;

  string recorder = 1;
  string monitoring_id = 2;
  repeated MetricData metrics_data = 3 [(gogoproto.nullable) = false];
  google.protobuf.Timestamp timestamp = 4 [(gogoproto.nullable) = false];
  string memo = 5;
}

// MsgRecordMetricsResponse defines the response for MsgRecordMetrics
message MsgRecordMetricsResponse {
  bool success = 1;
  string recording_hash = 2;
  string transaction_hash = 3;
}

// QueryMonitoringRequest defines the request for querying monitoring information
message QueryMonitoringRequest {
  string monitoring_id = 1;
}

// QueryMonitoringResponse defines the response for querying monitoring information
message QueryMonitoringResponse {
  MonitoringSession session = 1 [(gogoproto.nullable) = false];
}

// QueryMonitoringSessionsRequest defines the request for querying multiple monitoring sessions
message QueryMonitoringSessionsRequest {
  cosmos.base.query.v1beta1.PageRequest pagination = 1;
  TargetType target_type = 2;
  MonitoringStatus status = 3;
  string monitor = 4;
}

// QueryMonitoringSessionsResponse defines the response for querying multiple monitoring sessions
message QueryMonitoringSessionsResponse {
  repeated MonitoringSession sessions = 1 [(gogoproto.nullable) = false];
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}

// QueryMetricsRequest defines the request for querying performance metrics
message QueryMetricsRequest {
  string monitoring_id = 1;
  google.protobuf.Timestamp start_time = 2 [(gogoproto.nullable) = false];
  google.protobuf.Timestamp end_time = 3 [(gogoproto.nullable) = false];
  MetricType metric_type = 4;
}

// QueryMetricsResponse defines the response for querying performance metrics
message QueryMetricsResponse {
  repeated MetricData metrics = 1 [(gogoproto.nullable) = false];
}

// QueryMonitoringStatsRequest defines the request for querying monitoring statistics
message QueryMonitoringStatsRequest {
  string monitoring_id = 1;
}

// QueryMonitoringStatsResponse defines the response for querying monitoring statistics
message QueryMonitoringStatsResponse {
  MonitoringStats stats = 1 [(gogoproto.nullable) = false];
}

// MonitoringSession represents a monitoring session
message MonitoringSession {
  string id = 1;
  string monitor = 2;
  string target_id = 3;
  TargetType target_type = 4;
  MonitoringStatus status = 5;
  MonitoringConfig config = 6 [(gogoproto.nullable) = false];
  repeated AlertRule alert_rules = 7 [(gogoproto.nullable) = false];
  repeated MetricThreshold metric_thresholds = 8 [(gogoproto.nullable) = false];
  google.protobuf.Timestamp started_at = 9 [(gogoproto.nullable) = false];
  google.protobuf.Timestamp stopped_at = 10;
  int64 metrics_count = 11;
  int64 alerts_count = 12;
  google.protobuf.Timestamp last_activity = 13 [(gogoproto.nullable) = false];
  string memo = 14;
}

// MetricData represents performance metric data
message MetricData {
  string id = 1;
  string monitoring_id = 2;
  MetricType metric_type = 3;
  double metric_value = 4;
  google.protobuf.Timestamp timestamp = 5 [(gogoproto.nullable) = false];
  map<string, string> metadata = 6;
  MetricStatus status = 7;
  MetricUnit unit = 8;
}

// MonitoringStats represents monitoring statistics
message MonitoringStats {
  int64 total_sessions = 1;
  int64 active_sessions = 2;
  int64 stopped_sessions = 3;
  int64 total_metrics = 4;
  int64 total_alerts = 5;
  int64 average_session_duration_seconds = 6;
  string most_monitored_type = 7;
  google.protobuf.Timestamp last_activity = 8 [(gogoproto.nullable) = false];
}
