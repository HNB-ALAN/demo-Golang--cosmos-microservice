syntax = "proto3";
package store_network.v1;

import "gogoproto/gogo.proto";
import "cosmos/base/query/v1beta1/pagination.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/usc-platform/usc-social-xxx-app/SERVICES/service-04-usc-blockchain-core/block-chain-cosmos/x/store_network/types";

// DataType defines the type of stored data
enum DataType {
  DATA_TYPE_UNSPECIFIED = 0;
  DATA_TYPE_JSON = 1;
  DATA_TYPE_BINARY = 2;
  DATA_TYPE_TEXT = 3;
  DATA_TYPE_ENCRYPTED = 4;
  DATA_TYPE_COMPRESSED = 5;
}

// DataStatus defines the status of stored data
enum DataStatus {
  DATA_STATUS_UNSPECIFIED = 0;
  DATA_STATUS_ACTIVE = 1;
  DATA_STATUS_DELETED = 2;
  DATA_STATUS_ARCHIVED = 3;
  DATA_STATUS_CORRUPTED = 4;
}

// EncryptionType defines the type of encryption used
enum EncryptionType {
  ENCRYPTION_TYPE_UNSPECIFIED = 0;
  ENCRYPTION_TYPE_AES256 = 1;
  ENCRYPTION_TYPE_RSA = 2;
  ENCRYPTION_TYPE_ECC = 3;
  ENCRYPTION_TYPE_CUSTOM = 4;
  ENCRYPTION_TYPE_NONE = 5;
}

// AccessLevel defines the access level for stored data
enum AccessLevel {
  ACCESS_LEVEL_UNSPECIFIED = 0;
  ACCESS_LEVEL_PUBLIC = 1;
  ACCESS_LEVEL_PRIVATE = 2;
  ACCESS_LEVEL_RESTRICTED = 3;
  ACCESS_LEVEL_CONFIDENTIAL = 4;
}

// AccessPolicy defines the access policy for stored data
message AccessPolicy {
  repeated string allowed_users = 1;
  repeated string allowed_roles = 2;
  AccessLevel access_level = 3;
  google.protobuf.Timestamp expiration_time = 4;
  bool require_authentication = 5;
  bool require_authorization = 6;
  repeated string ip_whitelist = 7;
  repeated string ip_blacklist = 8;
}

// KeyMetadata represents encryption key metadata
message KeyMetadata {
  string algorithm = 1;
  int32 key_size = 2;
  string key_version = 3;
  string key_source = 4;
  map<string, string> additional_info = 5;
}

// EncryptionKey represents an encryption key with metadata
message EncryptionKey {
  string key_id = 1;
  EncryptionType encryption_type = 2;
  string key_hash = 3; // SHA-256 hash of the key
  google.protobuf.Timestamp created_at = 4 [(gogoproto.nullable) = false];
  google.protobuf.Timestamp expires_at = 5;
  string key_owner = 6;
  bool is_active = 7;
  KeyMetadata key_metadata = 8;
}

// MsgStoreData defines a message for storing data
message MsgStoreData {
  option (gogoproto.equal) = false;
  option (gogoproto.goproto_getters) = false;

  string storer = 1;
  string key = 2;
  string value = 3;
  DataType data_type = 4;
  EncryptionKey encryption_key = 5 [(gogoproto.nullable) = false];
  AccessPolicy access_policy = 6 [(gogoproto.nullable) = false];
  int32 replication_factor = 7; // Number of replicas
  bool enable_data_sharding = 8; // Enable data sharding
  string memo = 9;
}

// MsgStoreDataResponse defines the response for MsgStoreData
message MsgStoreDataResponse {
  bool success = 1;
  string storage_hash = 2;
  string transaction_hash = 3;
}

// MsgRetrieveData defines a message for retrieving data
message MsgRetrieveData {
  option (gogoproto.equal) = false;
  option (gogoproto.goproto_getters) = false;

  string retriever = 1;
  string key = 2;
  string decryption_key = 3;
}

// MsgRetrieveDataResponse defines the response for MsgRetrieveData
message MsgRetrieveDataResponse {
  bool success = 1;
  string value = 2;
  DataType data_type = 3;
  google.protobuf.Timestamp stored_at = 4 [(gogoproto.nullable) = false];
  string transaction_hash = 5;
}

// MsgDeleteData defines a message for deleting data
message MsgDeleteData {
  option (gogoproto.equal) = false;
  option (gogoproto.goproto_getters) = false;

  string deleter = 1;
  string key = 2;
  string deletion_proof = 3;
  string memo = 4;
}

// MsgDeleteDataResponse defines the response for MsgDeleteData
message MsgDeleteDataResponse {
  bool success = 1;
  string deletion_hash = 2;
  string transaction_hash = 3;
}

// MsgUpdateData defines a message for updating data
message MsgUpdateData {
  option (gogoproto.equal) = false;
  option (gogoproto.goproto_getters) = false;

  string updater = 1;
  string key = 2;
  string new_value = 3;
  DataType data_type = 4;
  EncryptionKey encryption_key = 5 [(gogoproto.nullable) = false];
  AccessPolicy access_policy = 6 [(gogoproto.nullable) = false];
  int32 replication_factor = 7; // Number of replicas
  bool enable_data_sharding = 8; // Enable data sharding
  string memo = 9;
}

// MsgUpdateDataResponse defines the response for MsgUpdateData
message MsgUpdateDataResponse {
  bool success = 1;
  string update_hash = 2;
  string transaction_hash = 3;
}

// QueryDataRequest defines the request for querying data
message QueryDataRequest {
  string key = 1;
  string storer = 2;
}

// QueryDataResponse defines the response for querying data
message QueryDataResponse {
  StoredData data = 1 [(gogoproto.nullable) = false];
}

// QueryDataListRequest defines the request for querying data list
message QueryDataListRequest {
  cosmos.base.query.v1beta1.PageRequest pagination = 1;
  string storer = 2;
  DataType data_type = 3;
  DataStatus status = 4;
}

// QueryDataListResponse defines the response for querying data list
message QueryDataListResponse {
  repeated StoredData data_list = 1 [(gogoproto.nullable) = false];
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}

// QueryStorageStatsRequest defines the request for querying storage statistics
message QueryStorageStatsRequest {
  string storer = 1;
}

// QueryStorageStatsResponse defines the response for querying storage statistics
message QueryStorageStatsResponse {
  StorageStats stats = 1 [(gogoproto.nullable) = false];
}

// StoredData represents stored data
message StoredData {
  string key = 1;
  string value = 2;
  string storer = 3;
  DataType data_type = 4;
  DataStatus status = 5;
  google.protobuf.Timestamp stored_at = 6 [(gogoproto.nullable) = false];
  google.protobuf.Timestamp updated_at = 7 [(gogoproto.nullable) = false];
  google.protobuf.Timestamp deleted_at = 8;
  string storage_hash = 9;
  string encryption_key_hash = 10;
  int64 size_bytes = 11;
  int32 replication_factor = 12; // Number of replicas
  bool data_sharding_enabled = 13; // Data sharding status
  map<string, string> metadata = 14; // Additional metadata
  string memo = 15;
}

// StorageStats represents storage statistics
message StorageStats {
  int64 total_entries = 1;
  int64 active_entries = 2;
  int64 deleted_entries = 3;
  int64 total_size_bytes = 4;
  int64 average_size_bytes = 5;
  int64 total_storers = 6;
  DataType most_common_type = 7;
  int64 total_replicas = 8; // Total number of replicas
  int64 sharded_entries = 9; // Number of sharded entries
  double replication_efficiency = 10; // Replication efficiency percentage
  google.protobuf.Timestamp last_activity = 11 [(gogoproto.nullable) = false];
}
