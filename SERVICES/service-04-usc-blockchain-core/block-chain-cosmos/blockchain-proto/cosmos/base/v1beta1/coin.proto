syntax = "proto3";
package cosmos.base.v1beta1;

import "gogoproto/gogo.proto";

option go_package = "github.com/cosmos/cosmos-sdk/types";

// Coin defines a token with a denomination and an amount.
message Coin {
  option (gogoproto.equal) = true;
  option (gogoproto.goproto_stringer) = false;

  string denom  = 1;
  string amount = 2 [(gogoproto.customtype) = "github.com/cosmos/cosmos-sdk/types.Int"];
}

// DecCoin defines a token with a denomination and a decimal amount.
message DecCoin {
  option (gogoproto.equal) = true;
  option (gogoproto.goproto_stringer) = false;

  string denom  = 1;
  string amount = 2 [(gogoproto.customtype) = "github.com/cosmos/cosmos-sdk/types.Dec"];
}

// IntProto defines a Protobuf wrapper around an Int object.
message IntProto {
  string int = 1 [(gogoproto.customtype) = "github.com/cosmos/cosmos-sdk/types.Int"];
}

// DecProto defines a Protobuf wrapper around a Dec object.
message DecProto {
  string dec = 1 [(gogoproto.customtype) = "github.com/cosmos/cosmos-sdk/types.Dec"];
}
