# GraphQL Service Configuration
service:
  name: "graphql-service"
  version: "1.0.0"
  environment: "production"
  region: "us-east-1"
  instance: "default"

server:
  host: "0.0.0.0"
  port: "4001"
  tls: true
  http:
    read_timeout: 30
    write_timeout: 30
    idle_timeout: 120

database:
  host: "postgres"
  port: 5432
  user: "usc_user"
  password: "your-secure-postgres-password"
  dbname: "usc_production"
  sslmode: "require"
  sslcert: "/etc/ssl/certs/postgres.crt"
  sslkey: "/etc/ssl/certs/postgres.key"
  sslrootcert: "/etc/ssl/certs/postgres.crt"
  max_conns: 100
  min_conns: 10

redis:
  host: "redis"
  port: 6379
  password: "your-secure-redis-password"
  db: 0
  pool_size: 50

clickhouse:
  host: "clickhouse"
  port: 9000
  user: "usc_user"
  password: "your-secure-clickhouse-password"
  dbname: "usc_analytics"
  secure: true

influxdb:
  host: "influxdb"
  port: 8086
  token: "your-secure-influxdb-token"
  org: "usc"
  bucket: "production_metrics"

quickwit:
  host: "quickwit"
  port: 7280
  user: "elastic"
  password: "your-secure-quickwit-password"
  index: "usc_production"

log:
  level: "info"
  format: "json"
  output: "stdout"
  filename: ""
  max_size: 100
  max_age: 30
  compress: true

metrics:
  enabled: true
  port: 9091
  path: "/metrics"

auth:
  jwt_secret: "your-super-secure-jwt-secret-key-must-be-at-least-32-characters-long-for-production"
  jwt_expiry: "1h"
  refresh_expiry: "24h"
  issuer: "usc-platform"

cache:
  ttl: 3600
  max_size: 10000
  enabled: true

health:
  enabled: true
  port: 8081
  path: "/health"
  interval: "30s"
  timeout: "5s"

# GraphQL specific configuration
graphql:
  federation:
    gateway_url: "http://localhost:4000"
    service_url: "http://localhost:4001"
    service_name: "graphql-service"
    schema_path: "./schema.graphql"
    introspection: true
    playground: true
  
  middleware:
    max_query_depth: 10
    max_query_complexity: 1000
    query_timeout: "30s"
    enable_tracing: true
    enable_metrics: true
    rate_limit_per_minute: 1000
  
  cors:
    enabled: true
    allowed_origins:
      - "http://localhost:3000"
      - "http://localhost:4000"
    allowed_methods:
      - "GET"
      - "POST"
      - "OPTIONS"
    allowed_headers:
      - "Content-Type"
      - "Authorization"
    allow_credentials: true
