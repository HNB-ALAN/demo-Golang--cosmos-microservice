# Kafka Service Configuration
service:
  name: "kafka-service"
  version: "1.0.0"
  environment: "production"
  region: "us-east-1"
  instance: "default"

server:
  host: "0.0.0.0"
  port: "9093"
  tls: true
  grpc:
    max_recv_msg_size: 4194304
    max_send_msg_size: 4194304
    keep_alive: true
  http:
    read_timeout: 30
    write_timeout: 30
    idle_timeout: 120

database:
  host: "postgres"
  port: 5432
  user: "usc_user"
  password: "your-secure-postgres-password"
  dbname: "usc_production"
  sslmode: "require"
  sslcert: "/etc/ssl/certs/postgres.crt"
  sslkey: "/etc/ssl/certs/postgres.key"
  sslrootcert: "/etc/ssl/certs/postgres.crt"
  max_conns: 100
  min_conns: 10

redis:
  host: "redis"
  port: 6379
  password: "your-secure-redis-password"
  db: 0
  pool_size: 50


clickhouse:
  host: "clickhouse"
  port: 9000
  user: "usc_user"
  password: "your-secure-clickhouse-password"
  dbname: "usc_analytics"
  secure: true

influxdb:
  host: "influxdb"
  port: 8086
  token: "your-secure-influxdb-token"
  org: "usc"
  bucket: "production_metrics"

quickwit:
  host: "quickwit"
  port: 7280
  user: "elastic"
  password: "your-secure-quickwit-password"
  index: "usc_production"

# Kafka Configuration
kafka:
  brokers: ["kafka-1:9092", "kafka-2:9092", "kafka-3:9092"]
  client_id: "kafka-service"
  group_id: "kafka-service-group"
  security_protocol: "PLAINTEXT"
  sasl_mechanism: "PLAIN"
  sasl_username: ""
  sasl_password: ""
  ssl_ca_file: ""
  ssl_cert_file: ""
  ssl_key_file: ""
  ssl_key_password: ""
  session_timeout: 30000
  heartbeat_interval: 3000
  max_poll_records: 500
  auto_offset_reset: "latest"
  enable_auto_commit: true
  compression_type: "snappy"
  batch_size: 16384
  linger_ms: 5
  retries: 3
  request_timeout: 30000

log:
  level: "info"
  format: "json"
  output: "stdout"
  filename: ""
  max_size: 100
  max_age: 30
  compress: true

metrics:
  enabled: true
  port: 9093
  path: "/metrics"

auth:
  jwt_secret: "your-super-secure-jwt-secret-key-must-be-at-least-32-characters-long-for-production"
  jwt_expiry: "1h"
  refresh_expiry: "24h"
  issuer: "usc-platform"

cache:
  ttl: 3600
  max_size: 10000
  enabled: true

health:
  enabled: true
  port: 8081
  path: "/health"
  interval: "30s"
  timeout: "5s"

# Kafka-specific configuration
kafka_service:
  # Producer configuration
  producer:
    topics:
      - "user-events"
      - "content-events"
      - "notification-events"
      - "analytics-events"
    batch_size: 100
    batch_timeout: "5s"
    compression: "snappy"
    retries: 3
    
  # Consumer configuration
  consumer:
    topics:
      - "user-events"
      - "content-events"
      - "notification-events"
    group_id: "kafka-service-consumer"
    auto_offset_reset: "latest"
    max_poll_records: 500
    session_timeout: "30s"
    heartbeat_interval: "3s"
    
  # Dead letter queue configuration
  dead_letter_queue:
    enabled: true
    topic: "dead-letter-queue"
    max_retries: 3
    retry_delay: "5s"
    
  # Monitoring configuration
  monitoring:
    enabled: true
    metrics_interval: "30s"
    health_check_interval: "10s"
    topic_health_check: true
